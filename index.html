<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>💕 Para Ti, Mi Amor 💕</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
            animation: backgroundShift 15s ease infinite;
        }

        @keyframes backgroundShift {
            0%, 100% { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); }
            50% { background: linear-gradient(135deg, #764ba2 0%, #f093fb 100%); }
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            color: white;
            margin-bottom: 50px;
            animation: fadeInDown 1s ease;
        }

        header h1 {
            font-size: 3.5em;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
            letter-spacing: 2px;
        }

        header p {
            font-size: 1.3em;
            opacity: 0.9;
            font-style: italic;
        }

        /* Sección de Mensajes */
        .messages-section {
            margin-bottom: 60px;
            animation: fadeInUp 1s ease 0.2s backwards;
        }

        .section-title {
            background: white;
            color: #764ba2;
            padding: 20px;
            border-radius: 15px;
            margin-bottom: 30px;
            text-align: center;
            font-size: 2em;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }

        .messages-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            margin-bottom: 40px;
        }

        .message-card {
            background: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            cursor: pointer;
            position: relative;
            overflow: hidden;
        }

        .message-card::before {
            content: '♥';
            position: absolute;
            top: -20px;
            right: -20px;
            font-size: 100px;
            color: rgba(244, 67, 54, 0.1);
            transition: all 0.3s ease;
        }

        .message-card:hover {
            transform: translateY(-10px) scale(1.05);
            box-shadow: 0 20px 40px rgba(244, 67, 54, 0.3);
        }

        .message-card:hover::before {
            top: -10px;
            right: -10px;
            font-size: 120px;
        }

        .message-card h3 {
            color: #764ba2;
            margin-bottom: 15px;
            font-size: 1.5em;
        }

        .message-card p {
            color: #555;
            line-height: 1.8;
            font-size: 1.1em;
        }

        .input-section {
            background: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            margin-bottom: 40px;
        }

        .input-section h3 {
            color: #764ba2;
            margin-bottom: 20px;
            font-size: 1.3em;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #764ba2;
            font-weight: bold;
        }

        .form-group input,
        .form-group textarea {
            width: 100%;
            padding: 12px;
            border: 2px solid #667eea;
            border-radius: 8px;
            font-family: inherit;
            font-size: 1em;
            transition: border-color 0.3s ease;
        }

        .form-group input:focus,
        .form-group textarea:focus {
            outline: none;
            border-color: #764ba2;
        }

        .form-group textarea {
            resize: vertical;
            min-height: 100px;
        }

        .button-group {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        button {
            flex: 1;
            min-width: 150px;
            padding: 15px;
            border: none;
            border-radius: 8px;
            font-size: 1em;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .btn-add-message {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .btn-add-message:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 20px rgba(118, 75, 162, 0.3);
        }

        .btn-add-image {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            color: white;
        }

        .btn-add-image:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 20px rgba(245, 87, 108, 0.3);
        }

        /* Sección de Galería */
        .gallery-section {
            animation: fadeInUp 1s ease 0.4s backwards;
        }

        .gallery-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 15px;
            margin-bottom: 40px;
        }

        .gallery-item {
            position: relative;
            overflow: hidden;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            transition: transform 0.3s ease;
            cursor: pointer;
            height: 250px;
        }

        .gallery-item:hover {
            transform: scale(1.05);
        }

        .gallery-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.3s ease;
        }

        .gallery-item:hover img {
            transform: scale(1.1);
        }

        .gallery-item-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            transition: opacity 0.3s ease;
            color: white;
            text-align: center;
            padding: 20px;
        }

        .gallery-item:hover .gallery-item-overlay {
            opacity: 1;
        }

        .delete-btn {
            background: #f5576c;
            color: white;
            border: none;
            padding: 8px 12px;
            border-radius: 5px;
            cursor: pointer;
            margin-top: 10px;
            transition: background 0.3s ease;
        }

        .delete-btn:hover {
            background: #d63447;
        }

        .empty-state {
            text-align: center;
            padding: 50px 20px;
            color: white;
            font-size: 1.2em;
        }

        .empty-state p {
            margin-bottom: 20px;
        }

        /* Animaciones */
        @keyframes fadeInDown {
            from {
                opacity: 0;
                transform: translateY(-30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes heartBeat {
            0%, 100% { transform: scale(1); }
            25% { transform: scale(1.1); }
            50% { transform: scale(1); }
        }

        .heart {
            display: inline-block;
            animation: heartBeat 1.5s ease-in-out infinite;
        }

        /* Modal para ver imagen completa */
        .modal {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.8);
            animation: fadeIn 0.3s ease;
        }

        .modal-content {
            margin: auto;
            display: block;
            width: 90%;
            max-width: 800px;
            padding: 20px;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            animation: zoomIn 0.3s ease;
        }

        .modal-content img {
            width: 100%;
            border-radius: 10px;
        }

        .close-modal {
            position: absolute;
            top: 20px;
            right: 30px;
            color: white;
            font-size: 40px;
            font-weight: bold;
            cursor: pointer;
            transition: color 0.3s ease;
        }

        .close-modal:hover {
            color: #f5576c;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        @keyframes zoomIn {
            from { transform: translate(-50%, -50%) scale(0.8); }
            to { transform: translate(-50%, -50%) scale(1); }
        }

        /* Responsive */
        @media (max-width: 768px) {
            header h1 {
                font-size: 2.5em;
            }

            header p {
                font-size: 1em;
            }

            .messages-grid {
                grid-template-columns: 1fr;
            }

            .button-group {
                flex-direction: column;
            }

            button {
                width: 100%;
            }

            .gallery-grid {
                grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
            }

            .gallery-item {
                height: 150px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1><span class="heart">💕</span> Para Ti, Mi Amor <span class="heart">💕</span></h1>
            <p>Un espacio especial para compartir nuestros momentos</p>
        </header>

        <!-- Sección de Mensajes -->
        <section class="messages-section">
            <div class="section-title">💌 Nuestros Mensajes</div>
            
            <div class="input-section">
                <h3>Añade un nuevo mensaje 💬</h3>
                <div class="form-group">
                    <label for="messageTitle">Título del mensaje:</label>
                    <input type="text" id="messageTitle" placeholder="Ej: Lo que siento por ti">
                </div>
                <div class="form-group">
                    <label for="messageText">Tu mensaje:</label>
                    <textarea id="messageText" placeholder="Escribe algo romántico..."></textarea>
                </div>
                <div class="button-group">
                    <button class="btn-add-message" onclick="addMessage()">Guardar Mensaje 💕</button>
                </div>
            </div>

            <div id="messagesContainer" class="messages-grid">
                <!-- Los mensajes se cargarán aquí -->
            </div>
        </section>

        <!-- Sección de Galería -->
        <section class="gallery-section">
            <div class="section-title">📸 Nuestra Galería</div>
            
            <div class="input-section">
                <h3>Añade una imagen a nuestra galería 📷</h3>
                <div class="form-group">
                    <label for="imageInput">Selecciona una imagen:</label>
                    <input type="file" id="imageInput" accept="image/*">
                </div>
                <div class="button-group">
                    <button class="btn-add-image" onclick="addImage()">Subir Imagen 💖</button>
                </div>
            </div>

            <div id="galleryContainer" class="gallery-grid">
                <!-- Las imágenes se cargarán aquí -->
            </div>
        </section>
    </div>

    <!-- Modal para ver imagen completa -->
    <div id="imageModal" class="modal">
        <span class="close-modal" onclick="closeModal()">&times;</span>
        <img class="modal-content" id="modalImage">
    </div>

    <script>
        // Cargar datos del localStorage
        function loadData() {
            loadMessages();
            loadGallery();
        }

        // Añadir mensaje
        function addMessage() {
            const title = document.getElementById('messageTitle').value;
            const text = document.getElementById('messageText').value;

            if (!title.trim() || !text.trim()) {
                alert('Por favor completa el título y el mensaje 💔');
                return;
            }

            let messages = JSON.parse(localStorage.getItem('messages') || '[]');
            messages.push({
                id: Date.now(),
                title: title,
                text: text,
                date: new Date().toLocaleDateString('es-ES')
            });

            localStorage.setItem('messages', JSON.stringify(messages));
            document.getElementById('messageTitle').value = '';
            document.getElementById('messageText').value = '';
            loadMessages();
        }

        // Cargar mensajes
        function loadMessages() {
            const messages = JSON.parse(localStorage.getItem('messages') || '[]');
            const container = document.getElementById('messagesContainer');

            if (messages.length === 0) {
                container.innerHTML = '<div class="empty-state" style="grid-column: 1/-1;"><p>🙈 Aún no hay mensajes...</p><p>¡Añade el primero! 💕</p></div>';
                return;
            }

            container.innerHTML = messages.map(msg => `
                <div class="message-card">
                    <h3>${msg.title}</h3>
                    <p>${msg.text}</p>
                    <small style="color: #999;">📅 ${msg.date}</small>
                    <br><br>
                    <button class="delete-btn" onclick="deleteMessage(${msg.id})">Eliminar ❌</button>
                </div>
            `).join('');
        }

        // Eliminar mensaje
        function deleteMessage(id) {
            if (confirm('¿Estás seguro de que quieres eliminar este mensaje? 💔')) {
                let messages = JSON.parse(localStorage.getItem('messages') || '[]');
                messages = messages.filter(msg => msg.id !== id);
                localStorage.setItem('messages', JSON.stringify(messages));
                loadMessages();
            }
        }

        // Añadir imagen
        function addImage() {
            const input = document.getElementById('imageInput');
            const file = input.files[0];

            if (!file) {
                alert('Por favor selecciona una imagen 📷');
                return;
            }

            const reader = new FileReader();
            reader.onload = function(e) {
                let images = JSON.parse(localStorage.getItem('images') || '[]');
                images.push({
                    id: Date.now(),
                    data: e.target.result,
                    date: new Date().toLocaleDateString('es-ES')
                });

                localStorage.setItem('images', JSON.stringify(images));
                input.value = '';
                loadGallery();
            };
            reader.readAsDataURL(file);
        }

        // Cargar galería
        function loadGallery() {
            const images = JSON.parse(localStorage.getItem('images') || '[]');
            const container = document.getElementById('galleryContainer');

            if (images.length === 0) {
                container.innerHTML = '<div class="empty-state" style="grid-column: 1/-1;"><p>📷 La galería está vacía...</p><p>¡Añade nuestras primeras fotos juntos! 💕</p></div>';
                return;
            }

            container.innerHTML = images.map(img => `
                <div class="gallery-item" onclick="openModal('${img.data.replace(/'/g, "\\'")}')">
                    <img src="${img.data}" alt="Foto">
                    <div class="gallery-item-overlay">
                        <div>
                            <p>📅 ${img.date}</p>
                            <button class="delete-btn" onclick="event.stopPropagation(); deleteImage(${img.id})">Eliminar ❌</button>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        // Eliminar imagen
        function deleteImage(id) {
            if (confirm('¿Estás seguro de que quieres eliminar esta imagen? 💔')) {
                let images = JSON.parse(localStorage.getItem('images') || '[]');
                images = images.filter(img => img.id !== id);
                localStorage.setItem('images', JSON.stringify(images));
                loadGallery();
            }
        }

        // Modal para ver imagen completa
        function openModal(imageSrc) {
            const modal = document.getElementById('imageModal');
            const modalImage = document.getElementById('modalImage');
            modalImage.src = imageSrc;
            modal.style.display = 'block';
        }

        function closeModal() {
            document.getElementById('imageModal').style.display = 'none';
        }

        window.onclick = function(event) {
            const modal = document.getElementById('imageModal');
            if (event.target === modal) {
                modal.style.display = 'none';
            }
        }

        // Cargar datos al abrir la página
        window.addEventListener('load', loadData);
    </script>
</body>
</html>
